menuSections:
  # ============================
  # MIDI — Burgers
  # ============================
  - group: midi
    title:
      fr: Burgers
      en: Burgers
      es: Hamburguesas
    dishes:
      - name:
          fr: Le Saint-Fé
          en: Le Saint-Fé
          es: Le Saint-Fé
        description:
          fr: >-
            Pain bun brioché, steak haché de bœuf 150g, aïoli maison, tomates
            cerises confites, oignons frits, Tomme de vache de la ferme, salade +
            frites maison
          en: >-
            Brioche bun, 150g beef patty, homemade aïoli, confit cherry tomatoes,
            fried onions, farmhouse Tomme cheese, salad + homemade fries
          es: >-
            Pan brioche, hamburguesa de ternera 150g, alioli casero, tomates
            cherry confitados, cebollas fritas, queso Tomme de granja, ensalada +
            patatas fritas caseras
        price: ''
        tags: []
      - name:
          fr: Le Burger Gourmand
          en: Le Burger Gourmand
          es: Le Burger Gourmand
        description:
          fr: >-
            Pain burger croissant, steak haché de bœuf 150g, tomates cerises
            confites, oignons frits, cheddar, sauce mayo épicée, salade + frites
            maison
          en: >-
            Croissant burger bun, 150g beef patty, confit cherry tomatoes,
            fried onions, cheddar, spicy mayo sauce, salad + homemade fries
          es: >-
            Pan croissant, hamburguesa de ternera 150g, tomates cherry
            confitados, cebollas fritas, cheddar, salsa mayo picante, ensalada +
            patatas fritas caseras
        price: ''
        tags: []

  # ============================
  # MIDI — Plats
  # ============================
  - group: midi
    title:
      fr: Plats
      en: Mains
      es: Platos
    dishes:
      - name:
          fr: Le Bagel
          en: Le Bagel
          es: Le Bagel
        description:
          fr: >-
            Pain bagel sésame, saumon fumé, crème citron ciboulette, salade,
            carottes râpées, radis, tomates cerises confites, oignons frits +
            frites maison et salade
          en: >-
            Sesame bagel bread, smoked salmon, lemon chive cream, salad, grated
            carrots, radishes, confit cherry tomatoes, fried onions + homemade
            fries and salad
          es: >-
            Pan de bagel con sésamo, salmón ahumado, crema de limón y cebollino,
            ensalada, zanahoria rallada, rábanos, tomates cherry confitados,
            cebollas fritas + patatas fritas caseras y ensalada
        price: ''
        tags: []
      - name:
          fr: Le Croque-monsieur feuilleté
          en: Le Croque-monsieur Feuilleté
          es: Le Croque-monsieur Feuilleté
        description:
          fr: de canard confit + frites maison et salade
          en: Duck confit + homemade fries and salad
          es: Pato confitado + patatas fritas caseras y ensalada
        price: ''
        tags: []
      - name:
          fr: Le Poke Bowl
          en: Le Poke Bowl
          es: Le Poke Bowl
        description:
          fr: >-
            Riz vinaigré, poulet, avocat, fêta, sésame noir et crudités de
            saison. Sauce : huile d'olive, citron, gingembre ou sauce mayo
            épicée. Option végé sans poulet
          en: >-
            Seasoned rice, chicken, avocado, feta, black sesame and seasonal raw
            vegetables. Sauce: olive oil, lemon, ginger or spicy mayo. Veggie
            option without chicken
          es: >-
            Arroz avinagrado, pollo, aguacate, feta, sésamo negro y crudités de
            temporada. Salsa: aceite de oliva, limón, jengibre o mayo picante.
            Opción vegetariana sin pollo
        price: ''
        tags: []

  # ============================
  # MIDI — Salades
  # ============================
  - group: midi
    title:
      fr: Salades
      en: Salads
      es: Ensaladas
    dishes:
      - name:
          fr: La Salade de La Cabriole
          en: La Salade de La Cabriole
          es: La Salade de La Cabriole
        description:
          fr: 'Salade, toasts de chèvre chaud de la ferme au miel, noix, crudités'
          en: 'Salad, warm farmhouse goat cheese toasts with honey, walnuts, raw vegetables'
          es: 'Ensalada, tostas de queso de cabra de granja caliente con miel, nueces, crudités'
        price: ''
        tags:
          - végétarien
      - name:
          fr: La Salade Estivale
          en: La Salade Estivale
          es: La Salade Estivale
        description:
          fr: >-
            Salade, fêta, tomates, poivrons grillés, concombre, avocat, carottes
            râpées, oignons frits
          en: >-
            Salad, feta, tomatoes, grilled peppers, cucumber, avocado, grated
            carrots, fried onions
          es: >-
            Ensalada, feta, tomates, pimientos asados, pepino, aguacate,
            zanahorias ralladas, cebollas fritas
        price: ''
        tags:
          - végétarien
      - name:
          fr: La Salade Italienne
          en: La Salade Italienne
          es: La Salade Italienne
        description:
          fr: >-
            Tomates, Burrata crémeuse 120g, huile d'olive, oignon rouge, basilic
            frais
          en: 'Tomatoes, creamy 120g Burrata, olive oil, red onion, fresh basil'
          es: 'Tomates, Burrata cremosa 120g, aceite de oliva, cebolla roja, albahaca fresca'
        price: ''
        tags:
          - végétarien

