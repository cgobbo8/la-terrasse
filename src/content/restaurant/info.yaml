philosophy: >-
  Cuisine faite maison, produits locaux et de saison. Nous travaillons avec les
  producteurs du terroir pour vous proposer des plats simples et gourmands.
menuUrl: /restaurant/carte
openingHours: |-
  Lundi – Vendredi : 12h – 14h / 19h – 21h
  Samedi – Dimanche : 12h – 14h30 / 19h – 21h30
openingHours_en: |-
  Monday – Friday: 12pm – 2pm / 7pm – 9pm
  Saturday – Sunday: 12pm – 2:30pm / 7pm – 9:30pm
openingHours_es: |-
  Lunes – Viernes: 12h – 14h / 19h – 21h
  Sábado – Domingo: 12h – 14h30 / 19h – 21h30
reservationPhone: '+33 6 02 43 86 41'
philosophy_en: >-
  Homemade cuisine with local, seasonal products. We work with local producers
  to offer you simple and delicious dishes.
philosophy_es: >-
  Cocina casera con productos locales y de temporada. Trabajamos con
  productores locales para ofrecerle platos sencillos y deliciosos.
