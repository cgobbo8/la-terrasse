    en: "Call us to book or come directly to enjoy the terrace."
    es: "Llámenos para reservar o venga directamente a disfrutar de la terraza."
subpage:
  carteDesc:
    fr: "Tapas, burgers, salades et plats de saison"
    en: "Tapas, burgers, salads and seasonal dishes"
    es: "Tapas, burgers, ensaladas y platos de temporada"
  producteursDesc:
    fr: "Les artisans derrière nos assiettes"
    en: "The artisans behind our plates"
    es: "Los artesanos detrás de nuestros platos"
soirees:
  title:
    fr: "Soirées en terrasse"
    en: "Evenings on the terrace"
    es: "Noches en la terraza"
  body:
    fr: "Concerts, karaoké, blind test, soirées tapas & DJ... La Terrasse s'anime toute la saison avec des soirées conviviales face au lac. Venez comme vous êtes, repartez avec le sourire."
    en: "Concerts, karaoke, blind tests, tapas nights & DJ sets... La Terrasse comes alive all season with convivial evenings by the lake. Come as you are, leave with a smile."
    es: "Conciertos, karaoke, blind test, noches de tapas & DJ... La Terrasse se anima toda la temporada con noches conviviales frente al lago. Ven como eres, vuelve con una sonrisa."
location:
  eyebrow:
    fr: "Le cadre"
    en: "The setting"
    es: "El entorno"
  title:
    fr: "Un restaurant au bord du lac de Saint-Ferréol"
    en: "A restaurant by Lake Saint-Ferréol"
    es: "Un restaurante junto al lago de Saint-Ferréol"
  body:
    fr: "À Sorèze, au pied de la Montagne Noire et à 45 minutes de Toulouse, La Terrasse vous accueille dans un cadre naturel d'exception. Installé à quelques pas du lac de Saint-Ferréol — plus grand réservoir du Canal du Midi classé UNESCO — le restaurant propose une cuisine faite maison avec des produits locaux du Tarn et du Lauragais. L'été, la terrasse face au lac est l'endroit idéal pour un déjeuner entre amis, un dîner en famille ou un apéro au coucher du soleil. Entre Castres et Revel, c'est une adresse que les Toulousains adoptent vite."
    en: "In Sorèze, at the foot of the Montagne Noire and just 45 minutes from Toulouse, La Terrasse welcomes you in an exceptional natural setting. Located steps from Lake Saint-Ferréol — the largest reservoir of the UNESCO-listed Canal du Midi — the restaurant serves homemade dishes with local produce from Tarn and Lauragais. In summer, the lakeside terrace is the perfect spot for lunch with friends, a family dinner or sunset drinks. Between Castres and Revel, it's an address that Toulouse locals quickly adopt."
    es: "En Sorèze, al pie de la Montagne Noire y a solo 45 minutos de Toulouse, La Terrasse le recibe en un entorno natural excepcional. Situado a pocos pasos del lago de Saint-Ferréol — el mayor embalse del Canal du Midi, declarado Patrimonio de la UNESCO — el restaurante ofrece cocina casera con productos locales del Tarn y del Lauragais. En verano, la terraza frente al lago es el lugar ideal para un almuerzo entre amigos, una cena en familia o un aperitivo al atardecer. Entre Castres y Revel, es una dirección que los habitantes de Toulouse adoptan rápidamente."
