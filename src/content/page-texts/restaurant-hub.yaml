hero:
  tagline:
    fr: "Tapas, burgers et bonne humeur face au lac"
    en: "Tapas, burgers and good vibes by the lake"
    es: "Tapas, burgers y buen rollo frente al lago"
  subtitle:
    fr: "Cuisine conviviale en terrasse, au bord du lac de Saint-Ferréol"
    en: "Convivial cuisine on the terrace, at Lake Saint-Ferréol"
    es: "Cocina convivial en terraza, junto al lago de Saint-Ferréol"
moment:
  eyebrow:
    fr: "L'ambiance"
    en: "The vibe"
    es: "El ambiente"
  title:
    fr: "L'esprit guinguette"
    en: "The guinguette spirit"
    es: "El espíritu guinguette"
  body:
    fr: "À quelques pas du lac, la terrasse s'anime sous les guirlandes. Ici, on partage des tapas et des planches entre amis, on croque dans un burger fait maison, on savoure une salade fraîche ou un croque-monsieur. Les soirées s'étirent en karaoké, blind test ou concert en terrasse. Produits locaux, ambiance festive, bonne humeur — c'est ça, La Terrasse."
    en: "Steps from the lake, the terrace comes alive under fairy lights. Here, you share tapas and platters with friends, bite into a homemade burger, enjoy a fresh salad or a croque-monsieur. Evenings stretch into karaoke, blind tests or live concerts on the terrace. Local produce, festive vibes, good times — that's La Terrasse."
    es: "A pocos pasos del lago, la terraza se anima bajo las guirnaldas. Aquí se comparten tapas y tablas entre amigos, se muerde un burger casero, se disfruta una ensalada fresca o un croque-monsieur. Las noches se alargan con karaoke, blind test o concierto en la terraza. Productos locales, ambiente festivo, buen rollo — eso es La Terrasse."
reserve:
  eyebrow:
    fr: "Réservation"
    en: "Reservation"
