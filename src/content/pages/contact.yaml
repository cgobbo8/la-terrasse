directionsList:
  - icon: car
    title:
      fr: "En voiture"
      en: "By car"
      es: "En coche"
    desc:
      fr: "Depuis Toulouse (~60 km, ~1h) : A61 direction Castelnaudary puis D629 vers Revel/Sorèze, ou A68 direction Castres puis D629."
      en: "From Toulouse (~60 km, ~1h): A61 towards Castelnaudary then D629 towards Revel/Sorèze, or A68 towards Castres then D629."
      es: "Desde Toulouse (~60 km, ~1h): A61 dirección Castelnaudary y luego D629 hacia Revel/Sorèze, o A68 dirección Castres y luego D629."
  - icon: bus
    title:
      fr: "En bus"
      en: "By bus"
      es: "En autobús"
    desc:
      fr: "Ligne liO 356 depuis Toulouse (~70 min). Ligne 761 depuis Castres via Sorèze. En été, navette quotidienne Revel → Saint-Ferréol, 1 € A/R (juillet-août)."
      en: "liO line 356 from Toulouse (~70 min). Line 761 from Castres via Sorèze. In summer, daily shuttle Revel → Saint-Ferréol, €1 return (July–August)."
      es: "Línea liO 356 desde Toulouse (~70 min). Línea 761 desde Castres vía Sorèze. En verano, lanzadera diaria Revel → Saint-Ferréol, 1 € ida y vuelta (julio-agosto)."
  - icon: bike
    title:
      fr: "À vélo"
      en: "By bike"
      es: "En bicicleta"
    desc:
      fr: "Voies vertes Sorèze–Revel (5,9 km) et Rigole de la Plaine (V84). Location de vélos électriques disponible à Sorèze."
      en: "Greenways Sorèze–Revel (5.9 km) and Rigole de la Plaine (V84). E-bike rental available in Sorèze."
      es: "Vías verdes Sorèze–Revel (5,9 km) y Rigole de la Plaine (V84). Alquiler de bicicletas eléctricas disponible en Sorèze."
  - icon: map-pin-check
    title:
      fr: "Sur place"
      en: "On site"
      es: "En el lugar"
    desc:
      fr: "Parking à proximité immédiate. Sanitaires modernes et accessibles PMR, à disposition de tous les visiteurs."
      en: "Parking right next to the site. Modern accessible restrooms available for all visitors."
      es: "Aparcamiento junto al sitio. Sanitarios modernos y accesibles, a disposición de todos los visitantes."
