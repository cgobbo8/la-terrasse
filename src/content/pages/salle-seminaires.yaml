why:
  eyebrow:
    fr: "Pourquoi Saint-Ferréol"
    en: "Why Saint-Ferréol"
    es: "Por qué Saint-Ferréol"
  title:
    fr: "Un cadre naturel à 45 minutes de Toulouse"
    en: "A natural setting 45 minutes from Toulouse"
    es: "Un entorno natural a 45 minutos de Toulouse"
  body:
    fr: "Le lac de Saint-Ferréol, au pied de la Montagne Noire dans le Tarn, offre un cadre idéal pour sortir du quotidien sans aller loin. À seulement 45 minutes de Toulouse et 30 minutes de Castres, notre base de loisirs combine une salle de séminaire entièrement équipée, un restaurant avec terrasse face au lac, et des activités de team building en pleine nature. Entre Revel et Sorèze, au cœur du Lauragais, c'est l'endroit parfait pour reconnecter vos équipes dans un environnement inspirant — loin des salles de réunion classiques, mais à portée d'autoroute."
    en: "Lake Saint-Ferréol, at the foot of the Montagne Noire in Tarn, offers the ideal setting for stepping away from the everyday without going far. Just 45 minutes from Toulouse and 30 minutes from Castres, our leisure base combines a fully equipped seminar room, a lakeside restaurant, and outdoor team building activities. Between Revel and Sorèze, in the heart of Lauragais, it's the perfect place to reconnect your teams in an inspiring environment — far from ordinary meeting rooms, but just off the motorway."
    es: "El lago de Saint-Ferréol, al pie de la Montagne Noire en el Tarn, ofrece el marco ideal para salir de la rutina sin ir lejos. A solo 45 minutos de Toulouse y 30 minutos de Castres, nuestra base de ocio combina una sala de seminarios totalmente equipada, un restaurante con terraza frente al lago y actividades de team building en plena naturaleza. Entre Revel y Sorèze, en el corazón del Lauragais, es el lugar perfecto para reconectar a sus equipos en un entorno inspirador — lejos de las salas de reuniones clásicas, pero cerca de la autopista."
faqTitle:
  fr: "Questions fréquentes"
  en: "Frequently asked questions"
  es: "Preguntas frecuentes"
faq:
  - question:
      fr: "Où se situe le lieu de séminaire ?"
      en: "Where is the seminar venue located?"
      es: "¿Dónde se encuentra el lugar del seminario?"
    answer:
      fr: "La Terrasse se trouve au lac de Saint-Ferréol, à Sorèze dans le Tarn (81). Le site est à 45 minutes de Toulouse par l'A61 ou l'A68, et à 30 minutes de Castres. Facilement accessible depuis toute l'Occitanie."
      en: "La Terrasse is located at Lake Saint-Ferréol, in Sorèze, Tarn (81). The site is 45 minutes from Toulouse via the A61 or A68, and 30 minutes from Castres. Easily accessible from across Occitanie."
      es: "La Terrasse se encuentra en el lago de Saint-Ferréol, en Sorèze, Tarn (81). El sitio está a 45 minutos de Toulouse por la A61 o la A68, y a 30 minutos de Castres. Fácilmente accesible desde toda Occitania."
  - question:
      fr: "Quelle est la capacité de la salle ?"
      en: "What is the venue capacity?"
      es: "¿Cuál es la capacidad de la sala?"
    answer:
      fr: "La salle de 195 m² accueille jusqu'à 202 personnes (debout/cocktail) ou 80 en configuration séminaire avec tables. Elle est équipée d'un vidéoprojecteur laser, d'une sono, du Wi-Fi et de la climatisation."
      en: "The 195 m² hall accommodates up to 202 people (standing/cocktail) or 80 in seminar configuration with tables. It is equipped with a laser projector, sound system, Wi-Fi and air conditioning."
      es: "La sala de 195 m² acoge hasta 202 personas (de pie/cóctel) o 80 en configuración seminario con mesas. Está equipada con proyector láser, sistema de sonido, Wi-Fi y climatización."
  - question:
      fr: "Quelles activités de team building proposez-vous ?"
      en: "What team building activities do you offer?"
      es: "¿Qué actividades de team building ofrecen?"
    answer:
      fr: "Paddle, canoë, archery tag, course d'orientation, VTT, pédalo… Toutes les activités de la base sont disponibles pour votre séminaire. Nous proposons aussi des programmes avec coaching professionnel (défis type Koh-Lanta, cohésion d'équipe, épreuves sportives)."
      en: "Paddle, canoe, archery tag, orienteering, mountain biking, pedal boats… All base activities are available for your seminar. We also offer programmes with professional coaching (Koh-Lanta-style challenges, team cohesion, sports challenges)."
      es: "Paddle, canoa, archery tag, orientación, BTT, hidropedal… Todas las actividades de la base están disponibles para su seminario. También ofrecemos programas con coaching profesional (retos tipo Koh-Lanta, cohesión de equipo, desafíos deportivos)."
  - question:
      fr: "La restauration est-elle possible sur place ?"
      en: "Is on-site catering available?"
      es: "¿Hay restauración en el lugar?"
    answer:
      fr: "Oui, notre restaurant prépare des repas avec des produits locaux et de saison. Plusieurs formules : du petit-déjeuner d'accueil au repas complet, en passant par l'apéro dînatoire et les pauses café."
      en: "Yes, our restaurant prepares meals with local, seasonal produce. Several options are available: from welcome breakfast to full meals, cocktail receptions and coffee breaks."
      es: "Sí, nuestro restaurante prepara comidas con productos locales y de temporada. Varias opciones disponibles: desde desayuno de bienvenida hasta comida completa, pasando por cóctel y pausas café."
  - question:
      fr: "Comment venir depuis Toulouse ?"
      en: "How do I get there from Toulouse?"
      es: "¿Cómo llegar desde Toulouse?"
    answer:
      fr: "Depuis Toulouse, prenez l'A61 direction Castelnaudary puis la D629 vers Revel et Sorèze, ou l'A68 direction Castres puis la D629. Comptez environ 1 heure de route. Parking gratuit sur place."
      en: "From Toulouse, take the A61 towards Castelnaudary then the D629 towards Revel and Sorèze, or the A68 towards Castres then the D629. Allow about 1 hour. Free parking on site."
      es: "Desde Toulouse, tome la A61 dirección Castelnaudary y luego la D629 hacia Revel y Sorèze, o la A68 dirección Castres y luego la D629. Cuente aproximadamente 1 hora de camino. Aparcamiento gratuito en el lugar."
