story:
  fr: >-
    Brasserie artisanale fondée par David et Antonin à Soual, dans le Tarn.
    Eighty One Brewing propose une gamme de bières aux profils variés — lager,
    Wheat IPA, Triple — et des éditions limitées au fil des saisons. Leurs bières
    accompagnent notre carte en pression et en bouteille.
  en: >-
    A craft brewery founded by David and Antonin in Soual, Tarn. Eighty One
    Brewing offers a range of beers with diverse profiles — lager, Wheat IPA,
    Triple — plus limited seasonal editions. Their beers feature on our menu on
    tap and in bottles.
  es: >-
    Cervecería artesanal fundada por David y Antonin en Soual, Tarn. Eighty One
    Brewing ofrece una gama de cervezas con perfiles variados — lager, Wheat IPA,
    Triple — y ediciones limitadas de temporada. Sus cervezas acompañan nuestra
    carta de grifo y en botella.
