name: Eighty One Brewing
product: Bières artisanales
story: >-
  Brasserie artisanale fondée par David et Antonin à Soual, dans le Tarn.
  Eighty One Brewing propose une gamme de bières aux profils variés — lager,
  Wheat IPA, Triple — et des éditions limitées au fil des saisons. Leurs bières
  accompagnent notre carte en pression et en bouteille.
