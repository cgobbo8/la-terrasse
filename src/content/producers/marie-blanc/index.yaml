story_en: >-
  Marie raises her goats on the slopes of the Montagne Noire, just a few
  kilometres from the lake. Her fresh and aged cheeses bring that local flavour
  you'll find on our cheese plate.
story_es: >-
  Marie cría sus cabras en las laderas de la Montagne Noire, a pocos kilómetros
  del lago. Sus quesos frescos y curados aportan ese sabor local que encontrará
  en nuestra tabla de quesos.
