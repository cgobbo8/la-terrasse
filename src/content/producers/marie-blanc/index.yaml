name: Marie Blanc
product: Fromages de chèvre
story: >-
  Marie élève ses chèvres sur les pentes de la Montagne Noire, à quelques
  kilomètres du lac. Ses fromages frais et affinés apportent ce goût de terroir
  que l'on retrouve dans notre assiette de fromages.
photo: /images/placeholders/claudia-chiavazza.webp
