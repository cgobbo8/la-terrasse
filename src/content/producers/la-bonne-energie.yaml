story:
  fr: >-
    Depuis Saint-Amans-Soult, La Bonne Énergie presse des jus de fruits bio non
    filtrés aux mélanges subtils — pomme-gingembre, pomme-kiwi, betterave… Leurs
    élixirs et sirops artisanaux accompagnent notre carte boissons.
  en: >-
    From Saint-Amans-Soult, La Bonne Énergie presses organic unfiltered fruit
    juices with subtle blends — apple-ginger, apple-kiwi, beetroot… Their
    artisan elixirs and syrups feature on our drinks menu.
  es: >-
    Desde Saint-Amans-Soult, La Bonne Énergie elabora zumos de frutas ecológicos
    sin filtrar con mezclas sutiles — manzana-jengibre, manzana-kiwi,
    remolacha… Sus elixires y siropes artesanales acompañan nuestra carta de
    bebidas.
