story:
  fr: >-
    Artisan charcutier-traiteur installé au Cabanial, Le Cochon Régaleur
    perpétue la tradition avec des charcuteries maison et des produits régionaux
    de qualité. Leurs planches et terrines garnissent notre carte apéro.
  en: >-
    An artisan charcutier-caterer based in Le Cabanial, Le Cochon Régaleur
    upholds tradition with homemade charcuterie and quality regional products.
    Their platters and terrines feature on our aperitif menu.
  es: >-
    Charcutero-caterer artesanal establecido en Le Cabanial, Le Cochon Régaleur
    perpetúa la tradición con embutidos caseros y productos regionales de
    calidad. Sus tablas y terrinas componen nuestra carta de aperitivos.
