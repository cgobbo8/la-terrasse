description:
  fr: >-
    Centre de vacances face au lac de Saint-Ferréol — 41 chambres, jusqu'à 130
    couchages, restaurant et salles de réunion dans un parc arboré et sécurisé.
    Idéal pour groupes, séminaires et séjours scolaires.
  en: >-
    Holiday centre facing Lake Saint-Ferréol — 41 rooms, up to 130 beds,
    restaurant and meeting rooms set in a secure, tree-lined park. Ideal for
    groups, seminars and school trips.
  es: >-
    Centro vacacional frente al lago de Saint-Ferréol — 41 habitaciones, hasta
    130 plazas, restaurante y salas de reuniones en un parque arbolado y seguro.
    Ideal para grupos, seminarios y excursiones escolares.
