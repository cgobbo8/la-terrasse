      - paragraph [ref=e79]: A pocos pasos del lago, la terraza se anima bajo las guirnaldas. Aquí se comparten tapas y tablas entre amigos, se muerde un burger casero, se disfruta una ensalada fresca o un croque-monsieur. Las noches se alargan con karaoke, blind test o concierto en la terraza. Productos locales, ambiente festivo, buen rollo — eso es La Terrasse.
