    - generic [ref=e210]:
      - paragraph [ref=e211]: El entorno
      - heading "Un restaurante junto al lago de Saint-Ferréol" [level=2] [ref=e212]
      - paragraph [ref=e213]: En Sorèze, al pie de la Montagne Noire y a solo 45 minutos de Toulouse, La Terrasse le recibe en un entorno natural excepcional. Situado a pocos pasos del lago de Saint-Ferréol — el mayor embalse del Canal du Midi, declarado Patrimonio de la UNESCO — el restaurante ofrece cocina casera con productos locales del Tarn y del Lauragais. En verano, la terraza frente al lago es el lugar ideal para un almuerzo entre amigos, una cena en familia o un aperitivo al atardecer. Entre Castres y Revel, es una dirección que los habitantes de Toulouse adoptan rápidamente.
