      - generic [ref=e366]:
        - paragraph [ref=e367]: Notre histoire
        - heading "Un lieu chargé d'histoire" [level=2] [ref=e368]
        - paragraph [ref=e369]: Le lac de Saint-Ferréol n'est pas un lac comme les autres.
        - paragraph [ref=e370]: Construit au XVIIe siècle par Pierre-Paul Riquet pour alimenter le Canal du Midi — chef-d'œuvre classé au patrimoine mondial de l'UNESCO — ce lac artificiel est le plus grand réservoir d'eau du canal. Depuis plus de 350 ans, il fait vivre le territoire, attire les promeneurs et incarne l'ingéniosité humaine au service de la nature.
        - paragraph [ref=e371]: Aujourd'hui, La Terrasse s'inscrit dans cette histoire en proposant un lieu de vie au bord de l'eau, où l'on vient se retrouver, partager un repas, bouger et profiter d'un cadre exceptionnel.
