      - generic [ref=e366]:
        - paragraph [ref=e367]: Our history
        - heading "A place steeped in history" [level=2] [ref=e368]
        - paragraph [ref=e369]: Lake Saint-Ferréol is no ordinary lake.
        - paragraph [ref=e370]: Built in the 17th century by Pierre-Paul Riquet to feed the Canal du Midi — a masterpiece listed as a UNESCO World Heritage Site — this artificial lake is the canal's largest water reservoir. For over 350 years, it has sustained the region, drawn visitors, and embodied human ingenuity in harmony with nature.
        - paragraph [ref=e371]: Today, La Terrasse carries on this legacy by offering a vibrant gathering place by the water, where people come to share a meal, stay active, and enjoy an exceptional setting.
