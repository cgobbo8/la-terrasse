      - generic [ref=e366]:
        - paragraph [ref=e367]: Nuestra historia
        - heading "Un lugar cargado de historia" [level=2] [ref=e368]
        - paragraph [ref=e369]: El lago de Saint-Ferréol no es un lago cualquiera.
        - paragraph [ref=e370]: Construido en el siglo XVII por Pierre-Paul Riquet para alimentar el Canal du Midi — obra maestra declarada Patrimonio de la Humanidad por la UNESCO — este lago artificial es el mayor embalse del canal. Desde hace más de 350 años, ha dado vida a la región, atraído visitantes y encarnado la ingeniosidad humana al servicio de la naturaleza.
        - paragraph [ref=e371]: Hoy, La Terrasse se inscribe en esta historia ofreciendo un lugar de vida junto al agua, donde la gente viene a compartir una comida, moverse y disfrutar de un entorno excepcional.
