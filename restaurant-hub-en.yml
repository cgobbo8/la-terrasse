    - generic [ref=e210]:
      - paragraph [ref=e211]: The setting
      - heading "A restaurant by Lake Saint-Ferréol" [level=2] [ref=e212]
      - paragraph [ref=e213]: In Sorèze, at the foot of the Montagne Noire and just 45 minutes from Toulouse, La Terrasse welcomes you in an exceptional natural setting. Located steps from Lake Saint-Ferréol — the largest reservoir of the UNESCO-listed Canal du Midi — the restaurant serves homemade dishes with local produce from Tarn and Lauragais. In summer, the lakeside terrace is the perfect spot for lunch with friends, a family dinner or sunset drinks. Between Castres and Revel, it's an address that Toulouse locals quickly adopt.
