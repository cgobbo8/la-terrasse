      - heading "Actividades en la naturaleza en el lago de Saint-Ferréol" [level=2] [ref=e35]
      - paragraph [ref=e36]: "En el corazón del Tarn, entre Toulouse y Castres, el lago de Saint-Ferréol es un terreno de juego natural excepcional. Nuestra base de ocio ofrece actividades acuáticas — paddle, canoa, hidropedal — y terrestres — BTT, mini-golf, archery tag, orientación — accesibles para todos: familias, grupos de amigos, excursiones escolares o team building de empresa. A solo 45 minutos de Toulouse y 30 minutos de Castres, al pie de la Montagne Noire, disfrute de un día al aire libre en un entorno declarado Patrimonio Mundial de la UNESCO."
